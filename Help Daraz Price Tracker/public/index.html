<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daraz Price Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
                /* Spinner styles */
        #spinner {
            display: none; /* Hidden by default */
            border: 8px solid #f3f3f3; /* Light grey */
            border-top: 8px solid #3498db; /* Blue */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #priceChart {
            display: none; /* Hidden by default */
        }
        #product-image{
            width: 256px;
            height: auto;
        }
        
    </style>
</head>
<body>
    <div id="app">
        <h1>Daraz Price Tracker</h1>
        <input type="text" id="product-url" placeholder="Enter Daraz product URL">
        <button id="track-button">Track Product</button>
        <div id="product-info">
            <img id="product-image" src="" alt="Product Image">
            <h2 id="product-name"></h2>
            <p id="product-price"></p>
            <select id="category-selector"></select>
        </div>
        <canvas id="price-chart" width="800" height="400"></canvas>
        <div id="loading-spinner" class="spinner" style="display: none;">Loading...</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
